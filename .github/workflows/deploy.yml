name: Build and Push Docker Image to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: personalfinanceregistry2026.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: personalfinanceregistry2026.azurecr.io/finance-coach:v1

  deploy-to-azure:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Azure Web App Deploy
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'finance-coach-app' # Replace with your actual Azure App Service name
          images: 'personalfinanceregistry2026.azurecr.io/finance-coach:v1'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
